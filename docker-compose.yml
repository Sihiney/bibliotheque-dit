version: '3.8'

# ══════════════════════════════════════════════════════════
#  BIBLIOTHÈQUE NUMÉRIQUE DIT — Docker Compose
#  Lance tout avec : docker compose up --build
# ══════════════════════════════════════════════════════════

services:

  # ── BASE DE DONNÉES ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bibliotheque-db
    environment:
      POSTGRES_USER:     user
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       bibliotheque
    volumes:
      - postgres_data:/var/lib/postgresql/data   # Les données survivent aux redémarrages
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d bibliotheque"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bibliotheque-network

  # ── MICROSERVICE LIVRES ──────────────────────────────────
  service-livres:
    build: ./service-livres
    container_name: bibliotheque-livres
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/bibliotheque
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy     # Attend que PostgreSQL soit prêt
    networks:
      - bibliotheque-network
    restart: unless-stopped

  # ── MICROSERVICE UTILISATEURS ────────────────────────────
  service-utilisateurs:
    build: ./service-utilisateurs
    container_name: bibliotheque-utilisateurs
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/bibliotheque
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bibliotheque-network
    restart: unless-stopped

  # ── MICROSERVICE EMPRUNTS ────────────────────────────────
  service-emprunts:
    build: ./service-emprunts
    container_name: bibliotheque-emprunts
    environment:
      DATABASE_URL:            postgresql://user:password@postgres:5432/bibliotheque
      SERVICE_LIVRES_URL:      http://service-livres:8001        # Nom du conteneur = nom de domaine
      SERVICE_UTILISATEURS_URL: http://service-utilisateurs:8002
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      service-livres:
        condition: service_started
      service-utilisateurs:
        condition: service_started
    networks:
      - bibliotheque-network
    restart: unless-stopped

  # ── FRONTEND ─────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: bibliotheque-frontend
    ports:
      - "80:80"                   # Accessible sur http://localhost
    depends_on:
      - service-livres
      - service-utilisateurs
      - service-emprunts
    networks:
      - bibliotheque-network
    restart: unless-stopped

# ── VOLUMES (stockage persistant) ────────────────────────
volumes:
  postgres_data:

# ── RÉSEAU INTERNE ────────────────────────────────────────
networks:
  bibliotheque-network:
    driver: bridge
